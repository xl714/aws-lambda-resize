upstream node-upstream {
    server awsimg-node:3420 max_fails=3 fail_timeout=5s;
}

server {

    listen 0.0.0.0:420;
    listen [::]:420;

    server_name dev.awsimg.dtd;

    root /workspace/aws-lambda-resize/local-env/express-app;

    access_log /var/log/nginx/awsimg_access.log;
    error_log  /var/log/nginx/awsimg_error.log;

    charset utf-8;

    location / {

        proxy_pass http://node-upstream;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

}
