upstream node-upstream {
    server awsmfimg-node:3420 max_fails=3 fail_timeout=5s;
}

server {

    listen 0.0.0.0:420;
    listen [::]:420;

    server_name dev.mfawsimg.dtd;

    root /projects/mfimg-aws-lambda-s3/local-env/express-app;

    access_log /var/log/nginx/mfawsimg_access.log;
    error_log  /var/log/nginx/mfawsimg_error.log;

    charset utf-8;

    location / {

        proxy_pass http://node-upstream;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

}
